<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veli Girişi | Bilgilendirme Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; 
            --primary-dark: #059669;
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        /* Arka Plan Dekorasyonu */
        .bg-glow {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px);
            opacity: 0.1; z-index: -1; top: 10%; right: 10%;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

        .login-card { 
            background: var(--card-bg); 
            padding: 50px 40px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 90%; 
            max-width: 420px; 
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-weight: 800; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -1px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 14px 18px; border-radius: 14px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 1rem; transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .btn-login { 
            width: 100%; padding: 16px; border-radius: 14px; background: var(--primary); 
            color: white; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; font-size: 1rem;
            margin-top: 10px; display: flex; align-items: center; justify-content: center;
        }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        .loader {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Oturum Kontrolü Sırasında Ekran */
        #splashScreen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div id="splashScreen">
    <div style="font-size: 4rem; margin-bottom: 20px;">👪</div>
    <div class="loader" style="display: block;"></div>
    <p style="margin-top: 20px; color: var(--text-muted); font-weight: 600;">Oturum kontrol ediliyor...</p>
</div>

<div class="bg-glow"></div>

<div class="login-card" id="loginContent" style="display: none;">
    <div style="font-size: 3rem; margin-bottom: 15px;">👪</div>
    <h2>Veli Girişi</h2>
    <p style="color:var(--text-muted); margin-bottom:30px">Çocuğunuzun gelişimini takip edin.</p>
    
    <div class="input-group">
        <label>Okul Numarası</label>
        <input type="number" id="vNo" placeholder="Örn: 105" inputmode="numeric">
    </div>
    
    <div class="input-group">
        <label>Şifre</label>
        <input type="password" id="vPass" placeholder="••••••••">
    </div>
    
    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span id="btnText">Giriş Yap</span>
        <div id="loader" class="loader"></div>
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB-gYQ-t92rNARvCLlmEMHKVj5ArZ29rJ0", 
        authDomain: "msr-odev-takip-ve-duyuru.firebaseapp.com", 
        projectId: "msr-odev-takip-ve-duyuru", 
        storageBucket: "msr-odev-takip-ve-duyuru.firebasestorage.app", 
        appId: "1:282364522003:web:b6320b950230ba6c6c19e6" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);

    // --- OTURUM KONTROLÜ (Sayfa Yüklenir Yüklenmez) ---
    const checkSession = () => {
        const session = localStorage.getItem('parentSession');
        if (session) {
            // Eğer session varsa direkt yönlendir
            window.location.href = "veli.html";
        } else {
            // Yoksa splash ekranını kaldır ve giriş formunu göster
            document.getElementById('splashScreen').style.display = "none";
            document.getElementById('loginContent').style.display = "block";
        }
    };

    // Sayfa açılır açılmaz kontrolü başlat
    checkSession();

    window.handleLogin = async function() {
        const no = document.getElementById('vNo').value.trim();
        const p = document.getElementById('vPass').value.trim();
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const loginBtn = document.getElementById('loginBtn');

        if(!no || !p) return alert("Lütfen okul numarası ve şifrenizi girin.");

        btnText.style.display = "none";
        loader.style.display = "block";
        loginBtn.disabled = true;

        try {
            const snap = await getDoc(doc(db, "veliler", no));
            
            if(snap.exists() && snap.data().sifre === p) {
                const userData = {
                    no: no,
                    adSoyad: snap.data().adSoyad,
                    sinif: snap.data().sinif,
                    sifreDegisti: snap.data().sifreDegisti || false
                };
                
                localStorage.setItem('parentSession', JSON.stringify(userData));
                window.location.href = "veli.html";
            } else {
                alert("Okul numarası veya şifre hatalı!");
                resetBtn();
            }
        } catch (error) {
            console.error("Giriş Hatası:", error);
            alert("Sistem hatası oluştu.");
            resetBtn();
        }
    }

    function resetBtn() {
        document.getElementById('btnText').style.display = "block";
        document.getElementById('loader').style.display = "none";
        document.getElementById('loginBtn').disabled = false;
    }
</script>

</body>
</html>
