<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Öğretmen Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: rgba(239, 68, 68, 0.1);
            --danger-text: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; width: 100%; }

        .bg-glow {
            position: fixed; width: 300px; height: 300px;
            background: var(--primary); filter: blur(100px);
            opacity: 0.1; z-index: -1; top: -5%; left: -5%;
        }

        /* GİRİŞ EKRANI */
        .overlay { 
            position: fixed; inset: 0; background: var(--bg); display: flex; 
            align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .login-card { 
            background: var(--card-bg); padding: 30px; border-radius: 24px; 
            width: 100%; max-width: 360px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        header { 
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); 
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        header strong { color: var(--primary); font-weight: 800; font-size: 1.2rem; letter-spacing: -1px; }

        main { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px;
            width: 100%;
        }

        h3 { font-weight: 800; margin-bottom: 20px; font-size: 1.2rem; color: var(--text-main); }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #334155; 
            border-radius: 12px; background: #0f172a; color: white; font-size: 0.95rem; outline: none;
        }

        /* TARİH ALANI DÜZENLEME */
        .date-row {
            display: flex; gap: 12px; margin: 8px 0; width: 100%;
        }
        .date-row > div { flex: 1; min-width: 0; } /* Taşmayı önleyen kritik kod */

        /* ÖĞRENCİ SEÇİCİ */
        .student-selector {
            background: rgba(15, 23, 42, 0.4); border: 1px solid #334155; border-radius: 16px;
            padding: 12px; margin: 15px 0;
        }
        .student-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; max-height: 200px; overflow-y: auto; padding: 5px;
        }
        .st-item {
            display: flex; align-items: center; gap: 8px;
            background: #0f172a; padding: 10px; border-radius: 10px;
            font-size: 0.75rem; cursor: pointer; border: 1px solid #334155;
            transition: 0.2s; overflow: hidden;
        }
        .st-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .st-item input { display: none; }
        .st-item:has(input:checked) { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }

        /* ÖDEV TAKİP LİSTESİ */
        .tracking-card { 
            background: var(--card-bg); border-radius: 18px; padding: 18px; 
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
            width: 100%; word-wrap: break-word;
        }
        .hw-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .read-badge { 
            background: rgba(16, 185, 129, 0.1); color: #10b981; 
            padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; white-space: nowrap;
        }

        .btn-primary { 
            background: var(--primary); color: white; border: none; padding: 14px; 
            border-radius: 12px; cursor: pointer; font-weight: 800; width: 100%; font-size: 1rem;
        }

        .okuyan-liste { 
            font-size: 0.75rem; color: var(--text-muted); background: rgba(15, 23, 42, 0.5); 
            padding: 10px; border-radius: 10px; margin-top: 10px; line-height: 1.4;
        }

        /* MOBİL AYARLAR */
        @media (max-width: 480px) {
            .date-row { flex-direction: column; gap: 0; }
            .student-grid { grid-template-columns: 1fr 1fr; }
            .hw-header { flex-direction: column; }
            .read-badge { margin-top: 5px; align-self: flex-start; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="loginBox" class="overlay">
    <div class="login-card">
        <h2 style="margin-bottom:20px; font-weight: 800;">Öğretmen Girişi</h2>
        <input type="text" id="lName" placeholder="Ad Soyad">
        <input type="password" id="lPass" placeholder="Şifre">
        <button class="btn-primary" onclick="login()">Giriş Yap</button>
    </div>
</div>

<header>
    <strong>MSR PORTAL</strong>
    <div id="navArea" style="display:none; align-items:center; gap:10px">
        <span id="tInfo" style="font-size:0.7rem; font-weight:700" class="text-muted"></span>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--danger-text); font-size:0.7rem; font-weight:800; cursor:pointer">ÇIKIŞ</button>
    </div>
</header>

<main id="mainContent" style="display:none">
    <div class="card">
        <h3>🚀 Ödev Gönder</h3>
        
        <select id="cSel" onchange="loadStudents()">
            <option value="">Sınıf Seçin</option>
        </select>

        <div id="studentArea" style="display:none;">
            <div class="student-selector">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center">
                    <label style="font-size:0.75rem; font-weight:800; display:flex; align-items:center; gap:5px; cursor:pointer">
                        <input type="checkbox" id="selectAll" onchange="toggleAll(this)" style="width:auto; margin:0"> Tüm Sınıf
                    </label>
                    <span id="stCount" style="font-size:0.65rem; color:var(--text-muted)">0 Seçildi</span>
                </div>
                <div id="studentCheckboxes" class="student-grid"></div>
            </div>
        </div>

        <input type="text" id="title" placeholder="Ödev Başlığı">
        
        <div class="date-row">
            <div>
                <label style="font-size:0.6rem; font-weight:800; color:var(--text-muted)">VERİLME</label>
                <input type="date" id="givenDate">
            </div>
            <div>
                <label style="font-size:0.6rem; font-weight:800; color:var(--text-muted)">TESLİM</label>
                <input type="date" id="dueDate">
            </div>
        </div>

        <textarea id="desc" rows="2" placeholder="Ödev açıklaması..."></textarea>
        
        <input type="file" id="hwFile" style="font-size:0.7rem">

        <button class="btn-primary" id="submitBtn" onclick="sendHw()">Ödevi Yayınla</button>
    </div>

    <div id="trackList">
        <h3 style="margin-bottom:15px">📋 Gönderilenler</h3>
        <div id="homeworkContainer"></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, deleteDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB-gYQ-t92rNARvCLlmEMHKVj5ArZ29rJ0", 
        authDomain: "msr-odev-takip-ve-duyuru.firebaseapp.com", 
        projectId: "msr-odev-takip-ve-duyuru", 
        storageBucket: "msr-odev-takip-ve-duyuru.firebasestorage.app", 
        messagingSenderId: "282364522003", 
        appId: "1:282364522003:web:b6320b950230ba6c6c19e6" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);
    const storage = getStorage(app); 

    let curName = "", curBranch = "", curClasses = {};

    window.login = async function() {
        const n = document.getElementById('lName').value.trim();
        const p = document.getElementById('lPass').value.trim();
        if(!n || !p) return;
        
        const snap = await getDoc(doc(db, "ogretmenler", n));
        if(snap.exists() && snap.data().sifre === p) {
            curName = n; curBranch = snap.data().brans || "Genel"; curClasses = snap.data().siniflar;
            document.getElementById('loginBox').style.display = "none";
            document.getElementById('mainContent').style.display = "block";
            document.getElementById('navArea').style.display = "flex";
            document.getElementById('tInfo').innerText = curName;
            
            const cSel = document.getElementById('cSel');
            cSel.innerHTML = '<option value="">Sınıf Seçin</option>';
            Object.keys(curClasses).forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
            startTrack();
        } else alert("Hatalı!");
    }

    window.loadStudents = function() {
        const c = document.getElementById('cSel').value;
        const studentArea = document.getElementById('studentArea');
        const container = document.getElementById('studentCheckboxes');
        container.innerHTML = "";
        if(c && curClasses[c]) {
            studentArea.style.display = "block";
            curClasses[c].forEach(s => {
                container.innerHTML += `
                    <label class="st-item">
                        <input type="checkbox" class="st-cb" value="${s.name}" onchange="updateCount()">
                        <span><b>${s.number}</b> ${s.name}</span>
                    </label>
                `;
            });
        } else { studentArea.style.display = "none"; }
    }

    window.updateCount = function() {
        const sel = document.querySelectorAll('.st-cb:checked').length;
        document.getElementById('stCount').innerText = sel + " Seçildi";
    }

    window.toggleAll = function(source) {
        document.querySelectorAll('.st-cb').forEach(cb => cb.checked = source.checked);
        updateCount();
    }

    window.sendHw = async function() {
        const c = document.getElementById('cSel').value; 
        const t = document.getElementById('title').value;
        const selectedStudents = Array.from(document.querySelectorAll('.st-cb:checked')).map(cb => cb.value);

        if(!c || !t || selectedStudents.length === 0) return alert("Eksik bilgi!");

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Yükleniyor...";

        try {
            let fileUrl = null; let fileName = null;
            const file = document.getElementById('hwFile').files[0];
            if(file) {
                const storageRef = ref(storage, 'odev_dosyalari/' + Date.now() + "_" + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                fileUrl = await getDownloadURL(snapshot.ref);
                fileName = file.name;
            }

            await addDoc(collection(db, "odevler"), { 
                ogretmenAdi: curName, ders: curBranch, sinif: c, 
                ogrenciler: selectedStudents, 
                baslik: t, verilmeTarihi: document.getElementById('givenDate').value, 
                teslimTarihi: document.getElementById('dueDate').value, 
                aciklama: document.getElementById('desc').value, 
                tarih: serverTimestamp(), okuyanlar: [],
                dosyaUrl: fileUrl, dosyaAdi: fileName 
            });
            
            alert("Gönderildi!");
            location.reload();
        } catch (e) { alert("Hata!"); btn.disabled = false; }
    }

    function startTrack() {
        onSnapshot(query(collection(db, "odevler"), where("ogretmenAdi", "==", curName)), (snap) => {
            const cont = document.getElementById('homeworkContainer'); cont.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data(); 
                cont.innerHTML += `
                    <div class="tracking-card">
                        <div class="hw-header">
                            <div>
                                <strong style="font-size:1rem; display:block">${d.baslik}</strong>
                                <span style="font-size:0.7rem; color:var(--text-muted)">${d.sinif} - ${d.teslimTarihi}</span>
                            </div>
                            <span class="read-badge">${d.okuyanlar.length} Görüldü</span>
                        </div>
                        <div class="okuyan-liste">
                            <b>Onaylayanlar:</b> ${d.okuyanlar.length > 0 ? d.okuyanlar.join(', ') : 'Yok'}
                        </div>
                        <button onclick="deleteHw('${docSnap.id}')" style="width:100%; margin-top:10px; padding:8px; background:var(--danger); color:var(--danger-text); border:none; border-radius:8px; font-weight:800; font-size:0.7rem; cursor:pointer">SİL</button>
                    </div>`;
            });
        });
    }
    window.deleteHw = async (id) => { if(confirm("Silinsin mi?")) await deleteDoc(doc(db, "odevler", id)); };
</script>
</body>
</html>
