<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ödev Duyuru & Takip - Veli Yönetim Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #10b981; --bg: #f8fafc; --white: #ffffff; --danger: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); padding: 30px; color: #1e293b; }
        
        /* ADMIN GİRİŞ EKRANI */
        .admin-login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: var(--white); padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }

        .container { max-width: 1200px; margin: auto; display: none; grid-template-columns: 400px 1fr; gap: 30px; }
        .card { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: var(--p); font-size: 1.4rem; font-weight: 800; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; }
        button { cursor: pointer; border: none; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-add { background: var(--p); color: white; width: 100%; padding: 15px; }
        
        .class-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .class-badge { 
            background: #ecfdf5; color: #065f46; padding: 10px 20px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; border: 2px solid transparent; transition: 0.2s;
        }
        .class-badge:hover { border-color: var(--p); transform: translateY(-2px); }
        .class-badge.active { background: var(--p); color: white; }

        .student-table { width: 100%; border-collapse: collapse; }
        .student-table th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.85rem; }
        .student-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .status-default { background: #ffedd5; color: #9a3412; }
        .status-changed { background: #dcfce7; color: #166534; }

        #studentEditArea { display: none; border: 2px solid var(--p); }
        .btn-del-mini { background: #fee2e2; color: #ef4444; padding: 6px 10px; font-size: 0.75rem; }
        .btn-danger-outline { background: #fff1f2; color: var(--danger); width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div id="adminAuth" class="admin-login-overlay">
    <div class="login-card">
        <h2 style="border:none">Veli Yönetim Girişi</h2>
        <input type="text" id="adminUser" placeholder="Kullanıcı Adı">
        <input type="password" id="adminPass" placeholder="Şifre">
        <button class="btn-add" onclick="checkAdminAuth()">Giriş Yap</button>
    </div>
</div>

<div class="container" id="mainAdmin">
    <aside>
        <div class="card">
            <h2>Toplu Sınıf Yükle</h2>
            <input type="text" id="vClassName" placeholder="Sınıf Adı (Örn: 9A)">
            <textarea id="vStudentList" rows="6" placeholder="Format: Ali Kaya 105, Ayşe Yılmaz 106"></textarea>
            <button onclick="saveVeliData()" class="btn-add">Sisteme Tanımla</button>
        </div>

        <div class="card" id="studentEditArea">
            <h2 id="editTitle">Sınıf Yönetimi</h2>
            <div id="singleAddForm">
                <p style="font-size: 0.8rem; font-weight: 800; margin-bottom: 5px;">➕ Yeni Öğrenci Ekle</p>
                <input type="text" id="newSName" placeholder="Ad Soyad">
                <input type="text" id="newSNo" placeholder="Okul No">
                <button onclick="addSingleStudent()" class="btn-add" style="padding: 10px;">Öğrenciyi Kaydet</button>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <p style="font-size: 0.8rem; font-weight: 800; color: var(--danger);">⚠️ Tehlikeli Bölge</p>
                <button onclick="deleteEntireClass()" class="btn-danger-outline">Sınıfı Komple Sil</button>
                <button onclick="closeEditor()" style="width:100%; margin-top:10px; background:#64748b; color:white; padding:10px;">Kapat</button>
            </div>
        </div>
    </aside>

    <main>
        <div class="card">
            <h2>Sınıflar</h2>
            <div id="classGrid" class="class-grid"></div>

            <div id="studentTableContainer" style="display:none">
                <h2 id="selectedClassName">Öğrenci Listesi</h2>
                <table class="student-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Ad Soyad</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc, writeBatch, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB-gYQ-t92rNARvCLlmEMHKVj5ArZ29rJ0",
        authDomain: "msr-odev-takip-ve-duyuru.firebaseapp.com",
        projectId: "msr-odev-takip-ve-duyuru",
        storageBucket: "msr-odev-takip-ve-duyuru.firebasestorage.app",
        messagingSenderId: "282364522003",
        appId: "1:282364522003:web:b6320b950230ba6c6c19e6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allVeliler = [];
    let currentClass = "";

    // ŞİFRE 12345 OLARAK GÜNCELLENDİ
    window.checkAdminAuth = function() {
        if(document.getElementById('adminUser').value === "yasinkoc" && document.getElementById('adminPass').value === "12345") {
            document.getElementById('adminAuth').style.display = "none";
            document.getElementById('mainAdmin').style.display = "grid";
            initSystem();
        } else alert("Yönetici girişi başarısız!");
    }

    window.saveVeliData = async function() {
        const className = document.getElementById('vClassName').value.trim();
        const rawData = document.getElementById('vStudentList').value.trim();
        if(!className || !rawData) return alert("Eksik bilgi!");

        const students = rawData.split(',').map(item => {
            const parts = item.trim().split(' ');
            const number = parts.pop();
            const name = parts.join(' ');
            return { name, number };
        });

        const batch = writeBatch(db);
        students.forEach(s => {
            const ref = doc(db, "veliler", s.number);
            batch.set(ref, { adSoyad: s.name, sinif: className, sifre: "12345", sifreDegisti: false }, { merge: true });
        });
        await batch.commit();
        alert("Sınıf başarıyla tanımlandı.");
        document.getElementById('vStudentList').value = "";
    }

    function initSystem() {
        onSnapshot(collection(db, "veliler"), (snapshot) => {
            allVeliler = [];
            const classes = new Set();
            snapshot.forEach(doc => {
                allVeliler.push({ id: doc.id, ...doc.data() });
                classes.add(doc.data().sinif);
            });

            const grid = document.getElementById('classGrid');
            grid.innerHTML = "";
            [...classes].sort().forEach(c => {
                const btn = document.createElement('div');
                btn.className = `class-badge ${c === currentClass ? 'active' : ''}`;
                btn.innerText = c;
                btn.onclick = () => selectClass(c);
                grid.appendChild(btn);
            });
            if(currentClass) renderTable();
        });
    }

    window.selectClass = function(c) {
        currentClass = c;
        document.getElementById('studentTableContainer').style.display = "block";
        document.getElementById('studentEditArea').style.display = "block";
        document.getElementById('selectedClassName').innerText = c + " Sınıfı Listesi";
        renderTable();
    }

    window.renderTable = function() {
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = "";
        allVeliler.filter(v => v.sinif === currentClass).forEach(s => {
            tbody.innerHTML += `<tr><td>${s.id}</td><td>${s.adSoyad}</td><td><span class="status-badge ${s.sifreDegisti ? 'status-changed' : 'status-default'}">${s.sifreDegisti ? 'GÜNCEL' : 'VARSAYILAN'}</span></td><td><button class="btn-del-mini" style="background:#f1f5f9; color:#1e293b;" onclick="resetPass('${s.id}')">Şifre Sıfırla</button><button class="btn-del-mini" onclick="deleteStudent('${s.id}')">Sil</button></td></tr>`;
        });
    }

    window.deleteEntireClass = async function() {
        if(confirm(`${currentClass} sınıfındaki TÜM kayıtlar silinecektir. Emin misiniz?`)) {
            const q = query(collection(db, "veliler"), where("sinif", "==", currentClass));
            const snap = await getDocs(q);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            alert("Sınıf ve tüm öğrencileri başarıyla silindi.");
            closeEditor();
        }
    }

    window.addSingleStudent = async function() {
        const n = document.getElementById('newSName').value.trim();
        const s = document.getElementById('newSNo').value.trim();
        if(!n || !s) return alert("Eksik bilgi!");
        await setDoc(doc(db, "veliler", s), { adSoyad: n, sinif: currentClass, sifre: "12345", sifreDegisti: false });
        document.getElementById('newSName').value = ""; document.getElementById('newSNo').value = "";
    }

    window.deleteStudent = async (id) => { if(confirm("Kayıt silinsin mi?")) await deleteDoc(doc(db, "veliler", id)); };
    window.resetPass = async (id) => { if(confirm("Şifre 12345 olarak sıfırlansın mı?")) await updateDoc(doc(db, "veliler", id), { sifre: "12345", sifreDegisti: false }); };
    window.closeEditor = () => { document.getElementById('studentEditArea').style.display = "none"; document.getElementById('studentTableContainer').style.display = "none"; currentClass = ""; };
</script>
</body>
</html>
