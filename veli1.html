<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veli Bilgilendirme Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; /* Veli paneli için yeşil tonu */
            --primary-dark: #059669;
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* Arka Plan Dekorasyonu */
        .bg-glow {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(150px);
            opacity: 0.1; z-index: -1; top: 10%; right: 10%;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

        /* GİRİŞ EKRANI */
        .login-wrapper { 
            height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; 
            background: radial-gradient(circle at top left, rgba(16, 185, 129, 0.05), transparent);
        }

        .login-card { 
            background: var(--card-bg); padding: 50px 40px; border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; max-width: 420px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-weight: 800; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -1px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 14px 18px; border-radius: 14px; border: 1px solid #334155; 
            background: #0f172a; color: white; font-size: 1rem; transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .btn-login { 
            width: 100%; padding: 16px; border-radius: 14px; background: var(--primary); 
            color: white; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* PANEL EKRANI */
        header { 
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .logo { font-weight: 800; font-size: 1.4rem; color: var(--primary); letter-spacing: -1px; }
        .student-chip { background: rgba(16, 185, 129, 0.1); color: var(--primary); padding: 8px 18px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; }

        main { width: 90%; max-width: 1200px; margin: 40px auto; }
        .hw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .hw-card { 
            background: var(--card-bg); border-radius: 24px; padding: 25px; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; 
            display: flex; flex-direction: column;
        }
        .hw-card:hover { transform: translateY(-8px); border-color: rgba(16, 185, 129, 0.3); }

        .hw-branch { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .hw-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 12px; color: var(--text-main); }
        .hw-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }

        .btn-download { 
            display: block; text-align: center; background: rgba(99, 102, 241, 0.1); color: var(--accent); 
            padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.85rem; 
            margin-bottom: 15px; border: 1px dashed var(--accent); transition: 0.3s; 
        }
        .btn-download:hover { background: rgba(99, 102, 241, 0.2); }

        .btn-read { 
            width: 100%; padding: 12px; border-radius: 12px; background: var(--primary); 
            color: white; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; 
        }
        .status-done { padding: 12px; border-radius: 12px; background: rgba(16, 185, 129, 0.1); color: var(--primary); font-weight: 800; text-align: center; }

        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        
        .btn-action { border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .pw-btn { background: #334155; color: white; margin-left: 10px; }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; margin-left: 8px; }
        .logout-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="loginSection" class="login-wrapper">
    <div class="login-card">
        <div style="font-size: 3rem; margin-bottom: 15px;">👪</div>
        <h2>Veli Erişimi</h2>
        <p style="color:var(--text-muted); margin-bottom:30px">Çocuğunuzun eğitim sürecini takip edin.</p>
        <div class="input-group">
            <label>Okul Numarası</label>
            <input type="text" id="vNo" placeholder="Örn: 105">
        </div>
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" id="vPass" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="handleLogin()">Giriş Yap</button>
    </div>
</div>

<div id="passSection" class="overlay" style="display:none; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);">
    <div class="login-card">
        <h2>Şifreyi Güncelle</h2>
        <p style="color:var(--text-muted); margin-bottom:20px">Güvenliğiniz için yeni bir şifre belirleyin.</p>
        <input type="password" id="newVPass" placeholder="Yeni Şifre" style="margin-bottom:15px">
        <button class="btn-login" onclick="changePass()">Şifremi Kaydet</button>
        <button onclick="document.getElementById('passSection').style.display='none'" style="background:none; border:none; color:var(--text-muted); margin-top:20px; cursor:pointer; font-weight:600;">Vazgeç</button>
    </div>
</div>

<div id="mainSection" style="display:none">
    <header>
        <div class="logo">Veli Bilgilendirme</div>
        <div style="display: flex; align-items: center;">
            <div id="studentInfo" class="student-chip"></div>
            <button class="btn-action pw-btn" onclick="document.getElementById('passSection').style.display='flex'">🔑</button>
            <button class="btn-action logout-btn" onclick="location.reload()">Çıkış</button>
        </div>
    </header>
    <main>
        <h3 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; display:flex; align-items:center; gap:10px;">
            <span style="color:var(--primary)">●</span> Aktif Ödevler
        </h3>
        <div id="activeGrid" class="hw-grid"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB-gYQ-t92rNARvCLlmEMHKVj5ArZ29rJ0", 
        authDomain: "msr-odev-takip-ve-duyuru.firebaseapp.com", 
        projectId: "msr-odev-takip-ve-duyuru", 
        storageBucket: "msr-odev-takip-ve-duyuru.firebasestorage.app", 
        messagingSenderId: "282364522003", 
        appId: "1:282364522003:web:b6320b950230ba6c6c19e6" 
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);
    let curNo = "", curStudent = "", curClass = "";

    window.handleLogin = async function() {
        const no = document.getElementById('vNo').value.trim();
        const p = document.getElementById('vPass').value.trim();
        if(!no || !p) return alert("Lütfen boş alan bırakmayın.");
        
        const snap = await getDoc(doc(db, "veliler", no));
        if(snap.exists() && snap.data().sifre === p) {
            curNo = no; curStudent = snap.data().adSoyad; curClass = snap.data().sinif;
            if(!snap.data().sifreDegisti) document.getElementById('passSection').style.display = "flex"; 
            else enterApp();
        } else alert("Numara veya şifre hatalı!");
    }

    window.changePass = async function() {
        const np = document.getElementById('newVPass').value.trim();
        if(np.length < 4) return alert("Şifre en az 4 karakter olmalıdır!");
        await updateDoc(doc(db, "veliler", curNo), { sifre: np, sifreDegisti: true });
        enterApp();
    }

    function enterApp() {
        document.getElementById('loginSection').style.display = "none"; 
        document.getElementById('passSection').style.display = "none";
        document.getElementById('mainSection').style.display = "block";
        document.getElementById('studentInfo').innerText = `${curStudent} (${curClass})`; 
        loadHws();
    }

    function loadHws() {
        onSnapshot(query(collection(db, "odevler"), where("sinif", "==", curClass)), (snap) => {
            const grid = document.getElementById('activeGrid'); 
            grid.innerHTML = "";
            snap.forEach(d => {
                const data = d.data(); 
                const read = data.okuyanlar && data.okuyanlar.includes(curStudent);
                const fileHtml = data.dosyaUrl ? `<a href="${data.dosyaUrl}" target="_blank" class="btn-download">📄 Dosyayı Görüntüle</a>` : '';

                grid.innerHTML += `
                    <div class="hw-card">
                        <div class="hw-branch">Ders: ${data.ders || "Genel"}</div>
                        <div class="hw-title">${data.baslik}</div>
                        <div class="hw-desc">${data.aciklama || "Açıklama belirtilmedi."}</div>
                        ${fileHtml}
                        <div style="margin-top:auto; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                            <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-muted); margin-bottom:10px;">
                                <span>✍️ ${data.ogretmenAdi}</span>
                                <span>🏁 ${data.teslimTarihi}</span>
                            </div>
                            ${!read ? `<button class="btn-read" onclick="markRead('${d.id}')">Okudum / Onayla</button>` : `<div class="status-done">✅ Görüldü</div>`}
                        </div>
                    </div>`;
            });
        });
    }

    window.markRead = async (id) => { 
        await updateDoc(doc(db, "odevler", id), { okuyanlar: arrayUnion(curStudent) }); 
    }
</script>
</body>
</html>
