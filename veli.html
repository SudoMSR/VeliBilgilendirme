<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veli Paneli | Bilgilendirme Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; }

        /* HEADER & DROPDOWN */
        header { 
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); 
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--primary); }

        .user-menu { position: relative; cursor: pointer; }
        .student-chip { 
            background: rgba(16, 185, 129, 0.1); color: var(--primary); 
            padding: 10px 18px; border-radius: 14px; font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .student-chip:hover { background: rgba(16, 185, 129, 0.2); }

        .dropdown {
            position: absolute; top: 120%; right: 0; background: var(--card-bg);
            border-radius: 16px; border: 1px solid var(--border); width: 200px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: none; overflow: hidden;
            animation: fadeIn 0.2s ease-out;
        }
        .dropdown.active { display: block; }
        .dropdown-item {
            padding: 12px 18px; font-size: 0.85rem; font-weight: 600; color: var(--text-main);
            display: flex; align-items: center; gap: 10px; transition: 0.2s; text-decoration: none;
            cursor: pointer;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--primary); }
        .dropdown-item.logout { color: #ef4444; }

        /* MODAL */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: var(--card-bg); padding: 30px; border-radius: 24px;
            width: 100%; max-width: 400px; border: 1px solid var(--border);
        }
        
        /* ARAMA VE NORMAL INPUT STİLLERİ */
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155;
            background: #0f172a; color: white; margin: 15px 0; outline: none;
        }
        .search-container {
            margin-bottom: 20px;
            position: relative;
        }
        .search-input {
            width: 100%; padding: 14px 20px 14px 45px; border-radius: 16px;
            border: 1px solid var(--border); background: var(--card-bg);
            color: var(--text-main); font-size: 0.9rem; font-weight: 600;
            outline: none; transition: 0.3s; margin: 0;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }

        /* DİĞER STİLLER */
        main { width: 92%; max-width: 1000px; margin: 30px auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-muted); font-weight: 700; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        /* DIŞA AKTAR BUTONU VE MENÜSÜ */
        .export-wrapper { position: relative; display: inline-block; }
        .export-main-btn { background: var(--accent); color: white; padding: 10px 20px; border-radius: 14px; border: none; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .export-main-btn:hover { background: #5356e6; }
        .export-dropdown { top: 125%; right: 0; min-width: 180px; z-index: 500; }

        /* KATEGORİ BAŞLIKLARI STİLİ */
        .section-title { font-size: 1.1rem; font-weight: 800; margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px; color: var(--text-main); }
        .section-title span { font-size: 0.8rem; background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 8px; color: var(--text-muted); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 22px; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; }
        .score-badge { position: absolute; top: 22px; right: 22px; padding: 6px 14px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; }
        .eval-time { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; display: block; }
        .eval-note { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px; font-size: 0.9rem; color: var(--text-main); margin-top: 12px; border-left: 4px solid var(--primary); line-height: 1.5; }
        .btn-file { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(99, 102, 241, 0.1); color: var(--accent); padding: 12px; border-radius: 14px; text-decoration: none; font-weight: 700; font-size: 0.85rem; margin: 12px 0; border: 1px dashed var(--accent); transition: 0.3s; }
        .btn-read { width: 100%; padding: 14px; border-radius: 14px; background: var(--primary); color: white; border: none; font-weight: 800; cursor: pointer; margin-top: auto; }
        .status-done { padding: 14px; border-radius: 14px; background: rgba(16, 185, 129, 0.1); color: var(--primary); font-weight: 800; text-align: center; margin-top: auto; }
        .hidden { display: none; }

        /* ÖĞRETMEN DEĞERLENDİRMESİ */
        .teacher-eval-box { margin: 15px 0; padding: 14px; border-radius: 16px; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); }
        .teacher-eval-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .teacher-eval-score { font-weight: 800; font-size: 0.8rem; padding: 4px 10px; border-radius: 8px; }
        .teacher-eval-note { font-size: 0.85rem; color: var(--text-main); line-height: 1.5; background: rgba(15, 23, 42, 0.3); padding: 10px; border-radius: 8px; border-left: 3px solid var(--primary); font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* PRINT / PDF CSS AYARLARI */
        @media print {
            body { background: white !important; color: black !important; }
            header, .tabs, .export-wrapper, .btn-read, .btn-file, .search-container { display: none !important; }
            main { width: 100% !important; margin: 0 !important; }
            .card { background: white !important; border: 1px solid #ccc !important; color: black !important; page-break-inside: avoid; box-shadow: none !important; margin-bottom: 15px; }
            .eval-note, .teacher-eval-box, .teacher-eval-note { background: #f8fafc !important; color: black !important; border-left: 4px solid #10b981 !important; }
            .tab-content { display: block !important; }
            .hidden { display: none !important; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <div class="logo">Veli Paneli</div>
    <div class="user-menu" onclick="window.toggleDropdown(event)">
        <div class="student-chip">
            <span id="studentName">Yükleniyor...</span>
            <span>▼</span>
        </div>
        <div id="userDropdown" class="dropdown">
            <div class="dropdown-item" onclick="window.openPassModal()">🔑 Şifre Değiştir</div>
            <div class="dropdown-item logout" onclick="window.logout()">🚪 Güvenli Çıkış</div>
        </div>
    </div>
</header>

<div id="passModal" class="modal-overlay">
    <div class="modal-card">
        <h3 style="font-weight: 800;">Şifreni Güncelle</h3>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">Yeni şifreniz en az 4 karakter olmalıdır.</p>
        <input type="password" id="newPassInput" placeholder="Yeni Şifre">
        <button class="btn-read" onclick="window.updatePassword()">Kaydet ve Kapat</button>
        <button onclick="window.closePassModal()" style="background:none; border:none; color:var(--text-muted); margin-top:15px; cursor:pointer; width:100%; font-weight:600;">Vazgeç</button>
    </div>
</div>

<main>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; flex-wrap: wrap;">
        <div class="tabs" style="margin-bottom: 0; flex: 1;">
            <button class="tab-btn active" onclick="window.switchTab('odevler', this)">📚 Ödevler</button>
            <button class="tab-btn" onclick="window.switchTab('degerlendirmeler', this)">⭐ Değerlendirmeler</button>
            <button class="tab-btn" onclick="window.switchTab('denemeler', this)">📈 Deneme Sonuçları</button>
        </div>

        <div class="export-wrapper">
            <button class="export-main-btn" onclick="window.toggleExportDropdown(event)">
                📥 Dışa Aktar <span>▼</span>
            </button>
            <div id="exportDropdown" class="dropdown export-dropdown">
                <div class="dropdown-item" onclick="window.exportData('excel')">🟢 Excel (.xlsx)</div>
                <div class="dropdown-item" onclick="window.exportData('csv')">🔵 CSV Formatı</div>
                <div class="dropdown-item" onclick="window.exportData('json')">🟡 JSON Yedekle</div>
                <div class="dropdown-item" onclick="window.exportData('pdf')">🔴 PDF Rapor Al</div>
            </div>
        </div>
    </div>

    <!-- ANLIK ARAMA VE FİLTRELEME ÇUBUĞU -->
    <div class="search-container" id="searchWrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Ödev adı, açıklama veya ders ismi ile filtreleyin..." oninput="window.handleSearchInput()">
    </div>

    <!-- ÖDEVLER KATEGORİZASYON ALANI -->
    <div id="odevlerSection" class="tab-content">
        <div class="section-title">🔴 Tamamlanmamış Ödevler <span id="uncompletedCount">0</span></div>
        <div id="uncompletedGrid" class="grid"></div>

        <div class="section-title" style="margin-top: 40px;">🟢 Tamamlanmış Ödevler <span id="completedCount">0</span></div>
        <div id="completedGrid" class="grid"></div>
    </div>

    <!-- DEĞERLENDİRMELER KATEGORİZASYON ALANI (TARİH TARİH GRUPLANIR) -->
    <div id="degerlendirmelerSection" class="tab-content hidden">
        <div id="evalGroupContainer"></div>
    </div>

    <div id="denemelerSection" class="tab-content hidden">
        <div class="card" style="margin-bottom: 25px; background: linear-gradient(145deg, #1e293b, #0f172a);">
            <h3 style="margin-bottom: 15px;">📊 Deneme Grafiği</h3>
            <div style="height: 250px; position: relative;">
                <canvas id="puanChart"></canvas>
            </div>
        </div>
        
        <div id="denemeListGrid" class="grid"></div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, query, where, onSnapshot, arrayUnion, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB-gYQ-t92rNARvCLlmEMHKVj5ArZ29rJ0",
      authDomain: "msr-odev-takip-ve-duyuru.firebaseapp.com",
      projectId: "msr-odev-takip-ve-duyuru",
      storageBucket: "msr-odev-takip-ve-duyuru.firebasestorage.app",
      messagingSenderId: "282364522003",
      appId: "1:282364522003:web:b6320b950230ba6c6c19e6",
      measurementId: "G-SDCT0CDX1L"
    };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);
    const messaging = getMessaging(app);

    const session = JSON.parse(localStorage.getItem('parentSession'));
    if(!session) window.location.href = "velilogin.html";
    document.getElementById('studentName').innerText = session.adSoyad;

    let currentActiveTab = 'odevler';
    let localDataStore = { odevler: [], degerlendirmeler: [], denemeler: [] };
    
    let activeOdevlerList = []; 
    let activeEvalList = [];

    // DROPDOWN KONTROLLERİ
    window.toggleDropdown = (e) => {
        e.stopPropagation();
        document.getElementById('exportDropdown').classList.remove('active');
        document.getElementById('userDropdown').classList.toggle('active');
    }

    window.toggleExportDropdown = (e) => {
        e.stopPropagation();
        document.getElementById('userDropdown').classList.remove('active');
        document.getElementById('exportDropdown').classList.toggle('active');
    }

    window.openPassModal = () => document.getElementById('passModal').classList.add('active');
    window.closePassModal = () => document.getElementById('passModal').classList.remove('active');

    window.updatePassword = async () => {
        const newPass = document.getElementById('newPassInput').value.trim();
        if(newPass.length < 4) return alert("Şifre çok kısa!");
        try {
            await updateDoc(doc(db, "veliler", session.no), { sifre: newPass, sifreDegisti: true });
            alert("Şifreniz başarıyla güncellendi.");
            window.closePassModal();
        } catch (e) { alert("Bir hata oluştu."); }
    }

    window.onclick = () => {
        document.getElementById('userDropdown').classList.remove('active');
        document.getElementById('exportDropdown').classList.remove('active');
    }

    // SEKME DEĞİŞTİRME AYARLARI
    window.switchTab = (target, btn) => {
        currentActiveTab = target;
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(target + 'Section').classList.remove('hidden');
        if(btn) btn.classList.add('active');
        
        const searchWrapper = document.getElementById('searchWrapper');
        const searchInput = document.getElementById('searchInput');
        
        // Arama çubuğunu sıfırla ve sekmeye göre placeholder'ı değiştir
        searchInput.value = ""; 
        
        if (target === 'odevler') {
            searchWrapper.classList.remove('hidden');
            searchInput.placeholder = "Ödev adı, açıklama veya ders ismi ile filtreleyin...";
            renderOdevlerDOM(activeOdevlerList);
        } else if (target === 'degerlendirmeler') {
            searchWrapper.classList.remove('hidden');
            searchInput.placeholder = "Öğretmen adı veya değerlendirme notu ile filtreleyin...";
            renderEvalDOM(activeEvalList);
        } else {
            searchWrapper.classList.add('hidden');
            if(target === 'denemeler') loadDenemeResults();
        }
    };

    const scoreColors = ["", "#ef4444", "#f59e0b", "#6366f1", "#10b981", "#22c55e"];

    // ARAMA INPUTU TETİKLENDİĞİNDE ÇALIŞAN MERKEZİ FONKSİYON
    window.handleSearchInput = () => {
        const queryText = document.getElementById('searchInput').value.toLocaleLowerCase('tr-TR').trim();
        if (currentActiveTab === 'odevler') {
            renderOdevlerDOM(activeOdevlerList, queryText);
        } else if (currentActiveTab === 'degerlendirmeler') {
            renderEvalDOM(activeEvalList, queryText);
        }
    };

    // ÖDEVLERİ DOM'A YAZDIRMA
    function renderOdevlerDOM(docsList, filterKeyword = "") {
        const uncompletedGrid = document.getElementById('uncompletedGrid');
        const completedGrid = document.getElementById('completedGrid');
        
        uncompletedGrid.innerHTML = "";
        completedGrid.innerHTML = "";
        
        localDataStore.odevler = [];
        let completedCount = 0;
        let uncompletedCount = 0;

        docsList.forEach(docItem => {
            const data = docItem.data();
            const docId = docItem.id;
            
            const ders = data.ders || 'GENEL';
            const baslik = data.baslik || '';
            const aciklama = data.aciklama || '';

            if (filterKeyword) {
                const aramaIcerigi = `${ders} ${baslik} ${aciklama}`.toLocaleLowerCase('tr-TR');
                if (!aramaIcerigi.includes(filterKeyword)) return;
            }

            const isRead = data.okuyanlar?.includes(session.adSoyad);
            const fileHtml = data.dosyaUrl ? `<a href="${data.dosyaUrl}" target="_blank" class="btn-file">📂 Ödev Dosyasını Görüntüle</a>` : '';

            const degerlendirmeler = data.degerlendirmeler || {};
            const temizle = (metin) => !metin ? "" : metin.normalize("NFC").toLocaleLowerCase('tr-TR').replace(/\s+/g, ' ').trim();
            const temizSessionIsim = temizle(session.adSoyad);

            const myEvalKey = Object.keys(degerlendirmeler).find(key => {
                const temizVeritabani = temizle(key);
                return temizVeritabani.includes(temizSessionIsim) || temizSessionIsim.includes(temizVeritabani);
            });
            
            const myEval = myEvalKey ? degerlendirmeler[myEvalKey] : null;
            
            localDataStore.odevler.push({
                Ders: ders,
                Baslik: baslik,
                Aciklama: aciklama,
                SonTeslim: data.teslimTarihi || data.sonTarih || '-',
                Durum: isRead ? 'Tamamlandı' : 'Bekliyor',
                OgretmenPuani: myEval ? `${myEval.puan} Puan` : 'Değerlendirilmedi',
                OgretmenNotu: myEval && myEval.not ? myEval.not : ''
            });

            let evalHtml = myEval ? `
                <div class="teacher-eval-box">
                    <div class="teacher-eval-head">
                        <span style="font-size:0.75rem; color:var(--text-muted); font-weight:700;">👨‍🏫 Öğretmen Değerlendirmesi</span>
                        <span class="teacher-eval-score" style="background:${scoreColors[myEval.puan]}20; color:${scoreColors[myEval.puan]}; border:1px solid ${scoreColors[myEval.puan]}40;">${"⭐".repeat(myEval.puan)} ${myEval.puan} Puan</span>
                    </div>
                    <div class="teacher-eval-note">${myEval.not ? `"${myEval.not}"` : 'Öğretmen bir not bırakmadı.'}</div>
                </div>` : `
                <div class="teacher-eval-box" style="background:rgba(245, 158, 11, 0.03); border-color:rgba(245, 158, 11, 0.1);">
                    <div class="teacher-eval-head" style="margin-bottom:0;"><span style="font-size:0.75rem; color:#f59e0b; font-weight:700;">⏳ Bu ödev henüz değerlendirilmedi.</span></div>
                </div>`;

            const cardHtml = `
                <div class="card">
                    <div style="font-size: 0.75rem; color: var(--accent); font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;">${ders}</div>
                    <div style="font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; line-height: 1.4;">${baslik}</div>
                    <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:12px;">${aciklama}</p>
                    ${fileHtml}
                    <div style="margin-top:10px; font-size:0.75rem; color:var(--text-muted); font-weight:700; margin-bottom: 12px;">📅 Son Teslim: ${data.teslimTarihi || data.sonTarih || '-'}</div>
                    ${evalHtml}
                    ${isRead ? '<div class="status-done">✅ Tamamlandı</div>' : `<button class="btn-read" onclick="window.markRead('${docId}')">TAMAMLADIM</button>`}
                </div>`;

            if (isRead) {
                completedGrid.innerHTML += cardHtml;
                completedCount++;
            } else {
                uncompletedGrid.innerHTML += cardHtml;
                uncompletedCount++;
            }
        });

        document.getElementById('uncompletedCount').innerText = uncompletedCount;
        document.getElementById('completedCount').innerText = completedCount;

        if (uncompletedCount === 0) uncompletedGrid.innerHTML = "<p style='color:var(--text-muted); font-size:0.9rem;'>Ödev bulunamadı veya tümü tamamlandı. 🎉</p>";
        if (completedCount === 0) completedGrid.innerHTML = "<p style='color:var(--text-muted); font-size:0.9rem;'>Uyuşan veya tamamlanmış bir ödev yok.</p>";
    }

    // ⭐ DEĞERLENDİRMELERİ GÜN GÜN GRUPLAYARAK VE FİLTRELEYEREK YAZDIRMA
    function renderEvalDOM(docsList, filterKeyword = "") {
        const container = document.getElementById('exportDropdown').classList.contains('active') ? null : document.getElementById('evalGroupContainer');
        if (container) container.innerHTML = "";

        localDataStore.degerlendirmeler = [];

        // Önce tüm verileri düz bir diziye çıkartıp filtreleyelim
        let filteredList = [];

        docsList.forEach(docSnap => {
            const data = docSnap.data();
            const ogretmen = data.ogretmenAdi || '';
            const not = data.not || '';
            const puan = data.puan || 0;
            
            const tDate = data.tarih ? data.tarih.toDate() : new Date();
            const gunBasligi = tDate.toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            const saatBilgisi = tDate.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

            if (filterKeyword) {
                const searchStr = `${ogretmen} ${not} ${puan} puan`.toLocaleLowerCase('tr-TR');
                if (!searchStr.includes(filterKeyword)) return;
            }

            filteredList.push({
                gunBasligi: gunBasligi,
                saatBilgisi: saatBilgisi,
                ogretmen: ogretmen,
                not: not,
                puan: puan
            });

            // Yedekleme motoru için veriyi doldur
            localDataStore.degerlendirmeler.push({
                Tarih: gunBasligi + " " + saatBilgisi,
                Ogretmen: ogretmen,
                Puan: puan + " Puan",
                Not: not || "Not bırakılmadı."
            });
        });

        if (!container) return; // Sadece data store güncellemesi yapılıyorsa render etme

        if (filteredList.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:var(--text-muted); padding:20px;'>Aramanızla eşleşen değerlendirme bulunamadı.</p>";
            return;
        }

        // Gün bazlı gruplama mekanizması
        let gruplanmisVeri = {};
        filteredList.forEach(item => {
            if (!gruplanmisVeri[item.gunBasligi]) {
                gruplanmisVeri[item.gunBasligi] = [];
            }
            gruplanmisVeri[item.gunBasligi].push(item);
        });

        // Oluşan grupları ekrana yazdır
        Object.keys(gruplanmisVeri).forEach(gun => {
            let sectionHtml = `
                <div class="date-group-section" style="margin-bottom: 35px;">
                    <div class="section-title" style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 15px; color: var(--primary);">
                        📅 ${gun} <span>${gruplanmisVeri[gun].length} Değerlendirme</span>
                    </div>
                    <div class="grid">`;

            gruplanmisVeri[gun].forEach(item => {
                const color = scoreColors[item.puan] || "#ccc";
                sectionHtml += `
                    <div class="card" style="border-left: 5px solid ${color}">
                        <div class="score-badge" style="background:${color}20; color:${color}; border:1px solid ${color}40">⭐ ${item.puan} PUAN</div>
                        <span class="eval-time">🕒 Saat: ${item.saatBilgisi}</span>
                        <div style="font-weight:800; font-size:1rem; color:var(--text-main);">${item.ogretmen}</div>
                        <div class="eval-note">${item.not || "Öğretmen not bırakmadı."}</div>
                    </div>`;
            });

            sectionHtml += `</div></div>`;
            container.innerHTML += sectionHtml;
        });
    }

    // CANLI VERİ TABANI DİNLEYİCİSİ (ÖDEVLER)
    onSnapshot(query(collection(db, "odevler"), where("sinif", "==", session.sinif)), (snap) => {
        activeOdevlerList = snap.docs;
        if(currentActiveTab === 'odevler') {
            const currentQuery = document.getElementById('searchInput').value.toLocaleLowerCase('tr-TR').trim();
            renderOdevlerDOM(activeOdevlerList, currentQuery);
        }
    });

    // CANLI VERİ TABANI DİNLEYİCİSİ (DEĞERLENDİRMELER)
    onSnapshot(query(collection(db, "aktiviteler"), where("ogrenciAdi", "==", session.adSoyad)), (snap) => {
        // En son yüklenen değerlendirme en üstte olacak şekilde kronolojik sıralama yapıyoruz
        activeEvalList = snap.docs.sort((a,b) => (b.data().tarih?.seconds || 0) - (a.data().tarih?.seconds || 0));
        if(currentActiveTab === 'degerlendirmeler') {
            const currentQuery = document.getElementById('searchInput').value.toLocaleLowerCase('tr-TR').trim();
            renderEvalDOM(activeEvalList, currentQuery);
        }
    });

    // DENEME SONUÇLARI YÜKLEME
    async function loadDenemeResults() {
        const grid = document.getElementById('denemeListGrid');
        const q = query(collection(db, "deneme_sonuclari"), where("adSoyad", "==", session.adSoyad));
        try {
            const snap = await getDocs(q);
            let examData = [];
            grid.innerHTML = snap.empty ? "<p style='text-align:center; color:var(--text-muted);'>Henüz deneme sonucu girilmemiş.</p>" : "";

            localDataStore.denemeler = [];
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const tarihOb = d.tarih?.toDate() || new Date();
                examData.push({ isim: d.denemeAdi, puan: d.puan, tarih: tarihOb });

                localDataStore.denemeler.push({
                    DenemeAdi: d.denemeAdi,
                    Tarih: tarihOb.toLocaleDateString('tr-TR'),
                    ToplamPuan: d.puan,
                    Turkce: d.turkce || 0,
                    Matematik: d.matematik || 0,
                    Sosyal: d.sosyal || 0,
                    Fen: d.fen || 0
                });

                grid.innerHTML += `
                    <div class="card" style="border-top: 4px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:15px;">
                            <div>
                                <div style="font-weight:800; font-size:1.1rem;">${d.denemeAdi}</div>
                                <small style="color:var(--text-muted)">${tarihOb.toLocaleDateString('tr-TR')}</small>
                            </div>
                            <div style="background:var(--primary); color:white; padding:5px 12px; border-radius:10px; font-weight:800;">${d.puan} P.</div>
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px;">
                            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center;"><small style="display:block; color:var(--text-muted)">Türkçe</small><strong>${d.turkce || 0}</strong></div>
                            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center;"><small style="display:block; color:var(--text-muted)">Matematik</small><strong>${d.matematik || 0}</strong></div>
                            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center;"><small style="display:block; color:var(--text-muted)">Sosyal</small><strong>${d.sosyal || 0}</strong></div>
                            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; text-align:center;"><small style="display:block; color:var(--text-muted)">Fen</small><strong>${d.fen || 0}</strong></div>
                        </div>
                    </div>`;
            });
            examData.sort((a, b) => a.tarih - b.tarih);
            updateChart(examData);
        } catch (e) { console.error(e); }
    }

    // 📥 GELİŞMİŞ FİLTRE DESTEKLİ DIŞARI AKTARMA MOTORU
    window.exportData = (type) => {
        // Aktif sekmedeki arama motorunu anlık tetikleterek localDataStore'un taze filtrelenmesini sağlıyoruz
        const queryText = document.getElementById('searchInput').value.toLocaleLowerCase('tr-TR').trim();
        if (currentActiveTab === 'odevler') {
            renderOdevlerDOM(activeOdevlerList, queryText);
        } else if (currentActiveTab === 'degerlendirmeler') {
            renderEvalDOM(activeEvalList, queryText);
        }

        let data = localDataStore[currentActiveTab];
        if(!data || data.length === 0) return alert("Aktarılacak filtrenize uygun herhangi bir veri bulunamadı.");

        const dosyaAdi = `${session.adSoyad.replace(/\s+/g, '_')}_${currentActiveTab}`;

        if (type === 'pdf') {
            document.getElementById('exportDropdown').classList.remove('active');
            setTimeout(() => { window.print(); }, 50);
            return;
        }

        if (type === 'json') {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
            triggerDownload(dataStr, `${dosyaAdi}.json`);
            return;
        }

        const headers = Object.keys(data[0]);
        
        if (type === 'csv') {
            let csvContent = "\uFEFF"; 
            csvContent += headers.join(",") + "\n";
            data.forEach(row => {
                let line = headers.map(head => {
                    let cell = row[head] === null || row[head] === undefined ? '' : String(row[head]);
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {
                        cell = '"' + cell.replace(/"/g, '""') + '"';
                    }
                    return cell;
                }).join(",");
                csvContent += line + "\n";
            });
            triggerDownload("data:text/csv;charset=utf-8," + encodeURIComponent(csvContent), `${dosyaAdi}.csv`);
        } 
        else if (type === 'excel') {
            let excelTemplate = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>' + currentActiveTab + '</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></' + 'head><body><table><thead><tr>';
            headers.forEach(h => excelTemplate += '<th style="background:#10b981; color:white;">' + h + '</th>');
            excelTemplate += '</tr></' + 'thead><tbody>';
            data.forEach(row => {
                excelTemplate += '<tr>';
                headers.forEach(h => excelTemplate += '<td>' + row[h] + '</' + 'td>');
                excelTemplate += '</' + 'tr>';
            });
            excelTemplate += '</tbody></' + 'table></' + 'body></' + 'html>';
            triggerDownload("data:application/vnd.ms-excel;charset=utf-8," + encodeURIComponent(excelTemplate), `${dosyaAdi}.xls`);
        }
    };

    function triggerDownload(url, filename) {
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function setupNotifications() {
        try {
            const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await getToken(messaging, { vapidKey: 'BPHsS-B3lS3T2EGMGy7mNIJl_fSupXmvUbQPeeQl_jODO6PNKqbfc0yPDg5-6UYY4a2cfsCtETcROqeJK7jJftI' });
                if (token) await updateDoc(doc(db, "veliler", session.no), { fcmToken: token });
            }
        } catch (error) { console.error(error); }
    }
    setupNotifications();

    window.markRead = async (id) => await updateDoc(doc(db, "odevler", id), { okuyanlar: arrayUnion(session.adSoyad) });
    window.logout = () => { localStorage.removeItem('parentSession'); window.location.href = "index.html"; };

    let myChart = null;
    function updateChart(data) {
        const ctx = document.getElementById('puanChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.isim),
                datasets: [{
                    label: 'Puan Başarısı',
                    data: data.map(d => d.puan),
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 6,
                    pointBackgroundColor: '#6366f1'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                }
            }
        });
    }
</script>
</body>
