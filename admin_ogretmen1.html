<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Bilgi Sistemi | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="logo2.jpeg">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
            --secondary: #10b981;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            min-height: 100vh;
            padding-bottom: 50px;
            overflow-x: hidden;
        }

        /* Arka Plan Parlama Efektleri */
        .bg-glow-1 {
            position: fixed; width: 500px; height: 500px;
            background: var(--primary); filter: blur(180px);
            opacity: 0.12; z-index: -1; top: -10%; left: -10%;
        }
        .bg-glow-2 {
            position: fixed; width: 400px; height: 400px;
            background: var(--secondary); filter: blur(150px);
            opacity: 0.08; z-index: -1; bottom: 10%; right: 10%;
        }

        /* HEADER */
        header { 
            background: rgba(30, 41, 59, 0.7); 
            border-bottom: 1px solid var(--border); 
            padding: 15px 20px; 
            position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(12px);
        }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand img { height: 40px; width: auto; border-radius: 10px; }
        .brand-text { font-weight: 800; color: white; font-size: 1.2rem; letter-spacing: -0.5px; }

        .nav-tabs { display: flex; background: rgba(15, 23, 42, 0.6); padding: 5px; border-radius: 14px; gap: 5px; border: 1px solid var(--border); }
        .nav-btn { 
            padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; 
            font-weight: 700; background: transparent; color: var(--text-muted); transition: 0.3s; font-size: 0.9rem;
        }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        /* LAYOUT */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }

        .card { 
            background: var(--card-bg); 
            border-radius: var(--radius); 
            padding: 30px; 
            border: 1px solid var(--border); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-out;
        }
        .section { display: none; }
        .section.active { display: block; }

        /* FORM ELEMANLARI */
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        
        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
            font-size: 0.95rem; font-weight: 500; transition: all 0.3s; outline: none; margin-bottom: 20px; 
            background: rgba(15, 23, 42, 0.5); color: white;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); background: rgba(15, 23, 42, 0.8); }

        .checklist { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .chip {
            display: inline-flex; padding: 10px 16px; background: rgba(255,255,255,0.05); color: var(--text-muted);
            border: 1px solid var(--border); border-radius: 100px; font-size: 0.85rem; font-weight: 700; transition: 0.3s; cursor: pointer;
        }
        .check-item input { display: none; }
        .check-item input:checked + .chip { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

        /* LİSTE ÖĞELERİ */
        .item-row { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 15px; overflow: hidden; transition: 0.3s; }
        .item-row:hover { border-color: rgba(99, 102, 241, 0.4); }
        .item-header { padding: 22px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .item-body { display: none; padding: 30px; background: rgba(15, 23, 42, 0.3); border-top: 1px solid var(--border); }

        /* BUTONLAR */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 24px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-p { background: var(--primary); color: white; width: 100%; }
        .btn-p:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2); }
        
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: var(--danger); color: white; }
        
        .btn-sm { padding: 8px 16px; font-size: 0.85rem; border-radius: 10px; }

        /* TABLO */
        .student-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .student-table th { text-align: left; font-size: 0.75rem; color: var(--text-muted); padding: 15px; border-bottom: 1px solid var(--border); }
        .student-table td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 900px) { 
            main { grid-template-columns: 1fr; } 
            .brand-text { display: none; }
        }
    </style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<header>
    <div class="nav-container">
        <div class="brand">
            <img src="logo2.jpeg" alt="Logo">
            <span class="brand-text">Yönetici Paneli</span>
        </div>
        
        <div class="nav-tabs">
            <button class="nav-btn active" id="btn-teachers" onclick="nav('sec-teachers')">Eğitmenler</button>
            <button class="nav-btn" id="btn-classes" onclick="nav('sec-classes')">Sınıflar</button>
        </div>
        
        <button class="btn btn-danger btn-sm" onclick="logout()">Çıkış Yap</button>
    </div>
</header>

<main>
    <div id="side-panel">
        <div id="form-teacher" class="card section active">
            <h3 style="margin-bottom:25px; font-weight:800; font-size: 1.4rem; letter-spacing: -1px;">👨‍🏫 Eğitmen Tanımla</h3>
            
            <label>Ad Soyad</label>
            <input type="text" id="tName" placeholder="Örn: Ahmet Yılmaz">
            
            <label>Branş</label>
            <input type="text" id="tBranch" placeholder="Örn: Matematik">
            
            <label>Panel Şifresi</label>
            <input type="text" id="tPass" placeholder="Giriş anahtarı belirleyin">
            
            <label>Sınıf Atamaları</label>
            <div id="mainChecklist" class="checklist"></div>
            
            <button class="btn btn-p" onclick="addTeacher()">Sisteme Kaydet</button>
        </div>

        <div id="form-class" class="card section">
            <h3 style="margin-bottom:25px; font-weight:800; font-size: 1.4rem; letter-spacing: -1px;">🏫 Yeni Sınıf</h3>
            
            <label>Sınıf Kodu</label>
            <input type="text" id="cName" placeholder="Örn: 12-FEN-A">
            
            <label>Öğrenci Listesi (No İsim)</label>
            <textarea id="cList" rows="8" placeholder="101 Ali Demir&#10;102 Ayşe Kaya"></textarea>
            
            <button class="btn btn-p" onclick="addClass()">Hesapları Oluştur</button>
        </div>
    </div>

    <div id="content-panel">
        <div id="list-teachers" class="section active">
            <h2 style="margin-bottom:30px; font-weight:800; letter-spacing: -1px; font-size: 2rem;">Eğitmen Yönetimi</h2>
            <div id="teacherContainer"></div>
        </div>
        <div id="list-classes" class="section">
            <h2 style="margin-bottom:30px; font-weight:800; letter-spacing: -1px; font-size: 2rem;">Sınıf & Veli Yönetimi</h2>
            <div id="classContainer"></div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    
    // Oturum Güvenliği
    if(localStorage.getItem('msr_admin_auth') !== 'true') {
        window.location.href = 'index.html';
    }

    const firebaseConfig = { 
        apiKey: "AIzaSyB-gYQ-t92rNARvCLlmEMHKVj5ArZ29rJ0", 
        authDomain: "msr-odev-takip-ve-duyuru.firebaseapp.com", 
        projectId: "msr-odev-takip-ve-duyuru", 
        storageBucket: "msr-odev-takip-ve-duyuru.firebasestorage.app", 
        messagingSenderId: "282364522003", 
        appId: "1:282364522003:web:b6320b950230ba6c6c19e6" 
    };

    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);

    let globalClasses = {};

    // --- NAVIGASYON ---
    window.nav = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id === 'sec-teachers') {
            document.getElementById('form-teacher').classList.add('active');
            document.getElementById('list-teachers').classList.add('active');
            document.getElementById('btn-teachers').classList.add('active');
        } else {
            document.getElementById('form-class').classList.add('active');
            document.getElementById('list-classes').classList.add('active');
            document.getElementById('btn-classes').classList.add('active');
        }
    };

    window.logout = () => {
        if(confirm("Sistemden çıkış yapılsın mı?")) {
            localStorage.clear();
            location.href = 'index.html'; 
        }
    };

    // --- REALTIME LİSTELER ---
    onSnapshot(collection(db, "siniflar"), (snap) => {
        const container = document.getElementById('classContainer');
        const mainCheck = document.getElementById('mainChecklist');
        container.innerHTML = ""; mainCheck.innerHTML = "";
        globalClasses = {};

        snap.forEach(d => {
            const data = d.data();
            const id = d.id;
            globalClasses[id] = data.ogrenciler || [];

            mainCheck.innerHTML += `
                <label class="check-item">
                    <input type="checkbox" name="cSet" value="${id}">
                    <span class="chip">${id}</span>
                </label>`;

            let studentRows = "";
            globalClasses[id].forEach((st, idx) => {
                studentRows += `
                <tr>
                    <td><input type="text" value="${st.number}" style="width:70px; margin:0; padding:8px;" onchange="updateStudent('${id}', ${idx}, 'number', this.value)"></td>
                    <td><input type="text" value="${st.name}" style="margin:0; padding:8px;" onchange="updateStudent('${id}', ${idx}, 'name', this.value)"></td>
                    <td style="text-align:right;">
                        <div style="display:flex; gap:8px; justify-content:flex-end;">
                            <button class="btn btn-sm" style="background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border);" onclick="resetStudentPass('${id}', ${idx})">🔑 Sıfırla</button>
                            <button class="btn btn-danger btn-sm" onclick="removeStudent('${id}', ${idx})">Sil</button>
                        </div>
                    </td>
                </tr>`;
            });

            container.innerHTML += `
            <div class="item-row">
                <div class="item-header" onclick="toggleAccordion('class-${id}')">
                    <div>
                        <b style="font-size:1.1rem; color:white;">${id} Sınıfı</b><br>
                        <small style="color:var(--text-muted)">${globalClasses[id].length} Kayıtlı Öğrenci</small>
                    </div>
                    <span style="color:var(--primary); font-weight:800; font-size:0.75rem; background:rgba(99, 102, 241, 0.1); padding:6px 14px; border-radius:10px; border:1px solid rgba(99, 102, 241, 0.2);">YÖNET</span>
                </div>
                <div id="class-${id}" class="item-body">
                    <label>Hızlı Öğrenci Ekle</label>
                    <div style="display:flex; gap:12px; margin-bottom:25px;">
                        <input type="text" id="newStNo-${id}" placeholder="No" style="flex:1; margin:0;">
                        <input type="text" id="newStName-${id}" placeholder="Ad Soyad" style="flex:2; margin:0;">
                        <button class="btn btn-p" style="width:auto; padding:0 25px;" onclick="addSingleStudent('${id}')">Ekle</button>
                    </div>
                    <table class="student-table">
                        <thead><tr><th>NO</th><th>ÖĞRENCİ BİLGİSİ</th><th style="text-align:right;">İŞLEMLER</th></tr></thead>
                        <tbody>${studentRows || '<tr><td colspan="3" style="text-align:center; padding:30px; color:var(--text-muted)">Henüz öğrenci eklenmemiş.</td></tr>'}</tbody>
                    </table>
                    <button class="btn btn-danger btn-p" style="margin-top:30px; border:1px dashed var(--danger);" onclick="delItem('siniflar','${id}')">Sınıfı Sistemden Kaldır</button>
                </div>
            </div>`;
        });
    });

    onSnapshot(collection(db, "ogretmenler"), (snap) => {
        const container = document.getElementById('teacherContainer');
        container.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const id = d.id;
            const assigned = Object.keys(data.siniflar || {});
            let chips = "";
            Object.keys(globalClasses).forEach(cName => {
                const chk = assigned.includes(cName) ? "checked" : "";
                chips += `<label class="check-item"><input type="checkbox" name="edit_c_${id}" value="${cName}" ${chk}><span class="chip">${cName}</span></label>`;
            });

            container.innerHTML += `
            <div class="item-row">
                <div class="item-header" onclick="toggleAccordion('teach-${id}')">
                    <div>
                        <b style="font-size:1.1rem; color:white;">${data.adSoyad}</b><br>
                        <small style="color:var(--text-muted)">${data.brans || 'Branş Atanmamış'}</small>
                    </div>
                    <span style="color:var(--secondary); font-weight:800; font-size:0.75rem; background:rgba(16, 185, 129, 0.1); padding:6px 14px; border-radius:10px; border:1px solid rgba(16, 185, 129, 0.2);">DÜZENLE</span>
                </div>
                <div id="teach-${id}" class="item-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div><label>Uzmanlık Alanı</label><input type="text" id="eb-${id}" value="${data.brans || ''}"></div>
                        <div><label>Giriş Parolası</label><input type="text" id="ep-${id}" value="${data.sifre || ''}"></div>
                    </div>
                    <label>Erişim Yetkisi Olan Sınıflar</label>
                    <div class="checklist">${chips}</div>
                    <div style="display:flex; gap:12px;">
                        <button class="btn btn-p" onclick="saveEdit('${id}')">Ayarları Güncelle</button>
                        <button class="btn btn-danger btn-sm" onclick="delItem('ogretmenler','${id}')">Eğitmeni Sil</button>
                    </div>
                </div>
            </div>`;
        });
    });

    // --- FONKSİYONLAR ---
    window.addClass = async () => {
        const name = document.getElementById('cName').value.toUpperCase().trim().replace(/\//g, "-"); 
        if(!name) return alert("Sınıf kodu gerekli!");
        const students = document.getElementById('cList').value.split('\n').map(l => {
            const p = l.trim().split(/\s+/);
            return p.length >= 2 ? { number: p.shift(), name: p.join(' '), password: "12345" } : null;
        }).filter(s => s);

        try {
            await setDoc(doc(db, "siniflar", name), { sinifAdi: name, ogrenciler: students });
            const promises = students.map(st => {
                return setDoc(doc(db, "veliler", st.number), {
                    adSoyad: st.name, ogrenciAdi: st.name, sifre: "12345", sifreDegisti: false, sinif: name
                }, { merge: true });
            });
            await Promise.all(promises);
            document.getElementById('cName').value = ""; document.getElementById('cList').value = ""; alert("Sınıf ve Veli erişimleri oluşturuldu.");
        } catch (e) { alert("Hata: " + e.message); }
    };

    window.addSingleStudent = async (cid) => {
        const no = document.getElementById(`newStNo-${cid}`).value.trim();
        const name = document.getElementById(`newStName-${cid}`).value.trim();
        if(!no || !name) return alert("Eksik bilgi!");
        try {
            const list = [...globalClasses[cid], { number: no, name: name, password: "12345" }];
            await updateDoc(doc(db, "siniflar", cid), { ogrenciler: list });
            await setDoc(doc(db, "veliler", no), {
                adSoyad: name, ogrenciAdi: name, sifre: "12345", sifreDegisti: false, sinif: cid
            }, { merge: true });
            document.getElementById(`newStNo-${cid}`).value = "";
            document.getElementById(`newStName-${cid}`).value = "";
        } catch (e) { alert("Hata!"); }
    };

    window.resetStudentPass = async (cid, idx) => {
        const student = globalClasses[cid][idx];
        if(confirm(`${student.name} şifresi "12345" yapılsın mı?`)) {
            await updateDoc(doc(db, "veliler", student.number), { sifre: "12345", sifreDegisti: false });
            alert("Sıfırlandı.");
        }
    };

    window.addTeacher = async () => {
        const name = document.getElementById('tName').value.trim();
        const branch = document.getElementById('tBranch').value.trim();
        const pass = document.getElementById('tPass').value.trim();
        if(!name || !pass) return alert("Ad ve Şifre zorunludur!");
        const selected = Array.from(document.querySelectorAll('input[name="cSet"]:checked')).map(e => e.value);
        let assigned = {};
        selected.forEach(c => { if(globalClasses[c]) assigned[c] = globalClasses[c]; });
        await setDoc(doc(db, "ogretmenler", name), { adSoyad: name, brans: branch, sifre: pass, siniflar: assigned });
        alert("Eğitmen eklendi.");
    };

    window.saveEdit = async (id) => {
        const brans = document.getElementById(`eb-${id}`).value;
        const sifre = document.getElementById(`ep-${id}`).value;
        const selected = Array.from(document.querySelectorAll(`input[name="edit_c_${id}"]:checked`)).map(e => e.value);
        let assigned = {};
        selected.forEach(c => { if(globalClasses[c]) assigned[c] = globalClasses[c]; });
        await updateDoc(doc(db, "ogretmenler", id), { brans, sifre, siniflar: assigned });
        alert("Güncellendi.");
    };

    window.toggleAccordion = (id) => {
        const el = document.getElementById(id);
        const isV = el.style.display === 'block';
        document.querySelectorAll('.item-body').forEach(b => b.style.display = 'none');
        el.style.display = isV ? 'none' : 'block';
    };

    window.delItem = async (coll, id) => { 
        if(confirm("Silme işlemini onaylıyor musunuz?")) await deleteDoc(doc(db, coll, id)); 
    };

    window.updateStudent = async (cid, idx, field, val) => {
        const list = [...globalClasses[cid]];
        list[idx][field] = val;
        await updateDoc(doc(db, "siniflar", cid), { ogrenciler: list });
    };

</script>
</body>
</html>
